    <style>
        /* ÜRÜNLER ÜSTÜN KARANLIK TASARIM - REFINED */
        body {
            background: var(--bg-dark);
            color: #fff;
        }

        /* Premium sticky category bar - Glass DARK */
        .ots-categories-container {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 76px;
            z-index: 900;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .ots-categories-bar {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            padding: 20px 8%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            /* Spacing between pills */
        }

        .ots-cat-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            padding: 15px 10px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            border-radius: 4px;
            /* Slight rounding for tiles */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .ots-cat-btn:first-child {
            padding-left: 10px;
            /* Reset */
        }

        /* Remove the old bottom line effect */
        .ots-cat-btn::after {
            display: none;
        }

        .ots-cat-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            font-weight: 800;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 160, 80, 0.2);
        }

        .ots-cat-btn:hover {
            border-color: var(--primary);
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .ots-cat-btn.active:hover {
            color: #000;
            background: var(--primary);
        }

        .ots-cat-btn:hover {
            color: var(--primary);
        }

        /* Product Grid - Minimalist & Industrial DARK */
        .ots-main-content {
            padding: 80px 8% 120px;
        }

        .ots-category-section {
            display: none;
        }

        .ots-category-section.active {
            display: block;
            animation: ots-fade-up 0.8s forwards;
        }

        @keyframes ots-fade-up {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ots-sub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            background: transparent;
        }

        .ots-product-card {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            height: 100%;
        }

        .ots-product-card:hover {
            border-color: var(--primary);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
        }

        .ots-card-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 80%;
            /* Landscape aspect ratio */
            overflow: hidden;
            background: #111;
        }

        .ots-card-img-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* No gray - natural colors as requested */
            filter: brightness(0.9);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), filter 0.8s ease;
        }

        .ots-product-card:hover .ots-card-img-wrapper img {
            transform: scale(1.05);
            filter: brightness(1);
        }

        /* Removed incele overlay */

        .ots-card-info {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .ots-card-info h3 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }

        .ots-card-info p {
            color: #888;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 15px;
            max-width: 100%;
            flex: 1;
        }

        .ots-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
        }

        .ots-tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 5px 12px;
        }

        .ots-btn-catalog {
            color: #000;
            background: var(--primary);
            padding: 6px 14px;
            text-decoration: none;
            font-weight: 800;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            opacity: 1;
            border-radius: 0;
            line-height: 1;
        }

        .ots-btn-catalog:hover {
            background: #fff;
            color: #000;
            transform: translateY(-2px);
        }

        @media (max-width: 1024px) {
            .ots-sub-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .ots-cat-btn {
                padding: 25px 15px;
                font-size: 10px;
            }
        }

        /* Custom Hero for Products */
        .ots-page-hero {
            background: url('assets/banner-products.jpg') no-repeat center center/cover;
            position: relative;
        }

        .ots-page-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* Mobile Category Toggle */
        .ots-cat-toggle-btn {
            display: none;
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #000;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-align: center;
        }

        @media (max-width: 1024px) {
            .ots-categories-bar {
                display: none;
                /* Hidden by default on mobile */
                grid-template-columns: 1fr;
                /* Stack vertically */
                max-height: 50vh;
                overflow-y: auto;
            }

            .ots-categories-bar.show {
                display: grid;
            }

            .ots-cat-toggle-btn {
                display: block;
            }

            .ots-categories-container {
                top: 60px;
                /* Adjust sticky top for mobile header */
            }
        }
    </style>
</head>

        async function renderCatalog() {
            let catalogData = initialData;

            // Render initial data immediately
            drawCatalog(catalogData);

            try {
                // Try fetching content from the static JSON file first (works on Vercel/Netlify)
                const response = await fetch('data/products.json');
                if (response.ok) {
                    catalogData = await response.json();
                    drawCatalog(catalogData); // Update with fresh data
                }
            } catch (error) {
                console.warn('Running in static mode with initial data.');
            }
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        function drawCatalog(catalogData) {
            const tabs = document.getElementById('cat-tabs');
            const mount = document.getElementById('catalog-mount');
            if (!tabs || !mount) return;

            tabs.innerHTML = '';
            mount.innerHTML = '';

            catalogData.forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = `ots-cat-btn ${i === 0 ? 'active' : ''}`;
                btn.textContent = cat.title;
                btn.onclick = () => showCategory(cat.id, btn);
                tabs.appendChild(btn);

                const section = document.createElement('section');
                section.id = `cat-${esc(cat.id)}`;
                section.className = `ots-category-section ${i === 0 ? 'active' : ''}`;

                let grid = '<div class="ots-sub-grid">';
                cat.subs.forEach(sub => {
                    const imgSrc = encodeURI(sub.img || '');
                    const linkHref = sub.link || '';
                    grid += `
                        <div class="ots-product-card">
                            <div class="ots-card-img-wrapper">
                                <img src="${imgSrc}" alt="${esc(sub.title)}" loading="lazy">
                            </div>

                            <div class="ots-card-info">
                                <h3>${esc(sub.title)}</h3>
                                <p>${esc(sub.desc)}</p>
                                <div class="ots-card-meta">
                                    <a href="${linkHref || '#'}" target="_blank" class="ots-btn-catalog" ${!linkHref ? 'onclick="alert(\'Katalog yakında eklenecek!\'); return false;"' : ''}>
                                        KATALOG
                                    </a>
                                </div>
                            </div>
                        </div>`;
                });
                grid += '</div>';
                section.innerHTML = grid;
                mount.appendChild(section);
            });
        }

        function toggleCategories() {
            const bar = document.getElementById('cat-tabs');
            const btn = document.querySelector('.ots-cat-toggle-btn');
            bar.classList.toggle('show');
            if (bar.classList.contains('show')) {
                btn.textContent = 'KATEGORİLERİ GİZLE ▲';
            } else {
                btn.textContent = 'KATEGORİLERİ GÖSTER ▼';
            }
        }

        function showCategory(id, btn) {
            document.querySelectorAll('.ots-cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.ots-category-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`cat-${id}`).classList.add('active');

            // Scroll to top of categories
            const container = document.querySelector('.ots-categories-container');
            const offset = container.getBoundingClientRect().top + window.scrollY - 100;
            window.scrollTo({ top: offset, behavior: 'smooth' });

            // Auto-close on mobile selection
            if (window.innerWidth <= 1024) {
                toggleCategories();
            }
        }
        window.onload = renderCatalog;
